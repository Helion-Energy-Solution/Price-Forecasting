name: Daily forecast inference

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC — ECMWF 00z run fully published by then
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  infer:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit updated price parquets back to this repo

    steps:
      - uses: actions/checkout@v4

      - name: Install eccodes C library
        run: sudo apt-get install -y libeccodes-dev

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Refresh price parquets
        env:
          ECCODES_PYTHON_USE_FINDLIBS: '1'
        run: python src/data/refresh_prices.py

      - name: Refresh Volue spot forecast
        env:
          VOLUE_CLIENT_ID: ${{ secrets.VOLUE_CLIENT_ID }}
          VOLUE_CLIENT_SECRET: ${{ secrets.VOLUE_CLIENT_SECRET }}
        run: |
          cat > ~/.volue_config.ini << EOF
          [volue_insight]
          client_id = ${VOLUE_CLIENT_ID}
          client_secret = ${VOLUE_CLIENT_SECRET}
          EOF
          python - << 'EOF'
          import pandas as pd
          from src.data.spot_forecast import fetch_spot_forecast_history
          today = pd.Timestamp.now(tz="UTC").date()
          fetch_spot_forecast_history(
              start_date=pd.Timestamp(today) - pd.Timedelta(days=2),
              end_date=pd.Timestamp(today),
          )
          EOF

      - name: Run inference
        env:
          ECCODES_PYTHON_USE_FINDLIBS: '1'
        run: python src/pipeline/inference.py

      - name: Commit updated price parquets
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -f data/raw/prices/
          if git diff --cached --quiet; then
            echo "Price parquets unchanged — nothing to commit"
          else
            git commit -m "chore: refresh price parquets $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Push forecasts to Market Dashboard
        env:
          MARKET_DASHBOARD_PAT: ${{ secrets.MARKET_DASHBOARD_PAT }}
        run: |
          git clone "https://x-access-token:${MARKET_DASHBOARD_PAT}@github.com/Helion-Energy-Solution/Market-Dashboard.git" /tmp/market-dashboard
          cp output/forecasts/*.json /tmp/market-dashboard/data/forecasts/
          cd /tmp/market-dashboard
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data/forecasts/
          if git diff --cached --quiet; then
            echo "Forecasts unchanged — nothing to push"
          else
            git commit -m "Update forecasts $(date -u +%Y-%m-%d)"
            git push
          fi
